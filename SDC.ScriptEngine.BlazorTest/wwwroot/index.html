<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDC.ScriptEngine.BlazorTest</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SDC.ScriptEngine.BlazorTest.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <!-- Loading spinner shown while WASM runtime boots -->
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x2715;</span>
    </div>
    <!--
      blazor.webassembly.js loads the WASM runtime.
      The {fingerprint} placeholder is replaced by the SDK at publish time.
      In development (dotnet run), no fingerprint suffix is used.
    -->
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
